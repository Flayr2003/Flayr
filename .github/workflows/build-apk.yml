name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Verify Flutter installation
      run: |
        flutter --version
        flutter doctor -v
        
    - name: Build APK
      run: flutter build apk --release --no-shrink
      
    - name: Get APK info
      run: |
        APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
        echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
        ls -lh $APK_PATH
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: flayr-release-apk
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 30
        
    - name: Create Release Info
      run: |
        echo "### 📱 APK Build Successful!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build Date:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**APK Size:** $(du -h build/app/outputs/flutter-apk/*.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Download APK from Artifacts section above" >> $GITHUB_STEP_SUMMARY
