name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Configure Git for GitLab dependencies
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://".insteadOf "git://"

      - name: Get dependencies
        run: flutter pub get
        timeout-minutes: 10

      - name: Build Signed Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Extract SHA-1 from APK
        if: success()
        run: |
          echo "### SHA-1 Certificate Fingerprint" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          keytool -printcert -jarfile build/app/outputs/flutter-apk/app-release.apk | grep -A 2 "SHA1\|SHA256"
          keytool -printcert -jarfile build/app/outputs/flutter-apk/app-release.apk | grep -A 2 "SHA1\|SHA256" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: APK Info
        if: success()
        run: |
          echo "### APK Build Info" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flayr-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
